<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Marks Analyzer</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Student Marks Analyzer</h1>
    <p>Enter your subjects and marks to see your average & performance visuals</p>

    <div class="input-section">
      <label>How many subjects? </label>
      <input type="number" id="numSubjects" min="1" max="10" value="5"/>
      <button onclick="generateInputs()">Set Subjects</button>
    </div>

    <div id="subjectsContainer" class="subjects-container"></div>

    <button id="calculateBtn" onclick="calculateAndShow()" style="display:none;">
      Calculate Average & Show Charts
    </button>

    <div id="result" class="result-section" style="display:none;">
      <h2>Your Result</h2>
      <p id="summary"></p>
      <p id="performance"></p>
    </div>

    <div class="charts" style="display:none;">
      <canvas id="barChart" width="400" height="200"></canvas>
      <canvas id="pieChart" width="400" height="400"></canvas>
    </div>
  </div>
  <!-- Input for Groq API key -->
<div style="margin: 20px; text-align: center;">
  <label for="groqKey">Paste your Groq API key to enable real AI tip:</label><br>
  <input type="text" id="groqKey" placeholder="gsk_..." style="width: 80%; max-width: 400px; padding: 10px; margin: 10px;">
  <button onclick="saveGroqKey()">Save Key</button>
</div>

<script>
  function saveGroqKey() {
    const key = document.getElementById("groqKey").value.trim();
    if (key.startsWith("gsk_")) {
      localStorage.setItem("groqApiKey", key);
      alert("Key saved! It will be used for AI tips.");
    } else {
      alert("Invalid key – should start with gsk_");
    }
  }
</script>
  <script src="script.js"></script>
  <script src="Ai.js"></script>
</body>
</html>
