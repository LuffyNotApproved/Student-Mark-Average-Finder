<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Marks Analyzer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Student Marks Analyzer</h1>
    <p>Enter your subjects and marks to get average + real Groq AI review</p>

    <!-- Groq Key Input (secure) -->
    <div class="key-input">
      <label for="groqKey">Paste your Groq API key to enable real AI review:</label>
      <input type="text" id="groqKey" placeholder="gsk_xxxxxxxxxxxx">
      <button onclick="saveGroqKey()">Save Key</button>
    </div>

    <div class="input-section">
      <label>How many subjects? </label>
      <input type="number" id="numSubjects" min="1" max="10" value="5">
      <button onclick="generateInputs()">Set Subjects</button>
    </div>

    <div id="subjectsContainer" class="subjects-container"></div>

    <button id="calculateBtn" onclick="calculateAndShow()" style="display:none;">
      Calculate Average & Show Charts
    </button>

    <div id="result" class="result-section" style="display:none;">
      <h2>Your Result</h2>
      <p id="summary"></p>
      <p id="performance"></p>
    </div>

    <div class="charts" style="display:none;">
      <canvas id="barChart" width="400" height="250"></canvas>
      <canvas id="pieChart" width="400" height="400"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
